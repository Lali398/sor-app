<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fejlesztés alatt</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --purple-deep: #10002b;
      --purple-mid: #1f005c;
      --purple-bright: #7b2fff;
      --purple-glow: #a855f7;
      --accent: #c084fc;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text: #e0e0e0;
      --text-dim: rgba(224, 224, 224, 0.55);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1f005c 0%, #10002b 50%, #000 100%);
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Animated background ── */
    .animated-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      animation: floatUp linear infinite;
      pointer-events: none;
    }

    .bubble:nth-child(1)  { width:  80px; height:  80px; left: 10%; animation-duration:  9s; animation-delay: 0s; }
    .bubble:nth-child(2)  { width: 120px; height: 120px; left: 20%; animation-duration: 12s; animation-delay: 2s; }
    .bubble:nth-child(3)  { width:  60px; height:  60px; left: 70%; animation-duration: 10s; animation-delay: 4s; }
    .bubble:nth-child(4)  { width: 100px; height: 100px; left: 80%; animation-duration: 14s; animation-delay: 1s; }
    .bubble:nth-child(5)  { width: 140px; height: 140px; left: 50%; animation-duration: 16s; animation-delay: 3s; }
    .bubble:nth-child(6)  { width:  55px; height:  55px; left: 35%; animation-duration:  8s; animation-delay: 5s; }
    .bubble:nth-child(7)  { width:  90px; height:  90px; left: 60%; animation-duration: 11s; animation-delay: 6s; }
    .bubble:nth-child(8)  { width:  70px; height:  70px; left:  5%; animation-duration: 13s; animation-delay: 1.5s; }

    @keyframes floatUp {
      0%   { transform: translateY(0)    rotate(0deg);   opacity: 0; }
      5%   { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* Subtle radial glow */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(123,47,255,0.25) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: orbDrift 18s ease-in-out infinite alternate;
    }
    .glow-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(168,85,247,0.18) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: orbDrift 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes orbDrift {
      from { transform: translate(0, 0); }
      to   { transform: translate(60px, 40px); }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 60px 52px 52px;
      max-width: 520px;
      width: calc(100% - 40px);
      text-align: center;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.45),
        0 0 0 1px rgba(123,47,255,0.15) inset,
        0 0 80px rgba(123,47,255,0.08);
      animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Icon ── */
    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(123,47,255,0.35), rgba(168,85,247,0.2));
      border: 1px solid rgba(168,85,247,0.3);
      margin-bottom: 28px;
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(168,85,247,0); }
      50%       { box-shadow: 0 0 0 12px rgba(168,85,247,0.12); }
    }

    .icon-wrap svg {
      width: 34px; height: 34px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Heading ── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.25);
      border-radius: 100px;
      padding: 4px 14px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(1.65rem, 5vw, 2.2rem);
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(135deg, #fff 30%, var(--purple-glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.65;
      margin-bottom: 36px;
    }

    /* ── Divider ── */
    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--purple-bright), transparent);
      margin: 0 auto 36px;
      border-radius: 2px;
    }

    /* ── Progress dots ── */
    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(168,85,247,0.3);
      animation: dotPop 1.4s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }
    .dot:nth-child(4) { animation-delay: 0.66s; }
    .dot:nth-child(5) { animation-delay: 0.88s; }

    @keyframes dotPop {
      0%, 100% { background: rgba(168,85,247,0.25); transform: scale(1); }
      50%       { background: var(--accent); transform: scale(1.45); }
    }

    /* ── Footer note ── */
    .footer-note {
      font-size: 0.78rem;
      color: rgba(224,224,224,0.3);
      letter-spacing: 0.04em;
    }

    .footer-note span {
      color: rgba(168,85,247,0.55);
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="animated-bg">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <!-- Card -->
  <div class="card">
    <div class="icon-wrap">
      <!-- Wrench + sparkle icon -->
      <svg viewBox="0 0 24 24">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"/>
      </svg>
    </div>

    <div class="badge">Karbantartás</div>

    <h1>Fejlesztés alatt</h1>

    <div class="divider"></div>

    <p class="subtitle">
      Az oldal jelenleg fejlesztés alatt áll.<br />
      <strong style="color: var(--accent); font-weight: 600;">Hamarosan visszatér</strong> – köszönjük a türelmedet!
    </p>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <p class="footer-note">© 2026 &nbsp;·&nbsp; <span>Dolgozunk rajta ⚡</span></p>
  </div>

</body>
</html>
